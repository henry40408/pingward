# Coverage configuration. main.rs only wires components together inside a live
# process (socket bind, runtime spawn, background loops) and is not
# unit-testable; exclude it from the project coverage denominator.
ignore:
  - "src/main.rs"

coverage:
  status:
    project:
      default:
        # Compare against the base commit rather than an absolute bar: the gate
        # fails only when a PR regresses coverage by more than the threshold.
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%
