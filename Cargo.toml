[package]
name = "pingward"
version = "0.1.0"
edition = "2021"

[lib]
name = "pingward"
path = "src/lib.rs"

[[bin]]
name = "pingward"
path = "src/main.rs"

[dependencies]
argon2 = { version = "0.5", features = ["rand"] }
askama = "0.16"
axum = "0.8"
axum-extra = { version = "0.12", default-features = false, features = ["cookie", "form"] }
rand_core = { version = "0.6", features = ["getrandom"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "time", "net", "sync"] }
sqlx = { version = "0.9", default-features = false, features = ["runtime-tokio", "sqlite", "tls-rustls-aws-lc-rs", "migrate"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = "0.10"
cron = "0.15"
uuid = { version = "1", features = ["v4"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
axum-test = "21"
wiremock = "0.6"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "test-util"] }
