{% extends "base.html" %}
{% block body %}
<div class="auth">
  <div class="card">
    <div class="cb">
      <a class="brand" href="/"><span class="glyph">▚</span>pingward</a>
      <h1>Log in</h1>
      {% if let Some(error) = error %}<p class="flash err" data-testid="login-error">{{ error }}</p>{% endif %}
      <form method="post" action="/login">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" data-testid="username-input" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" data-testid="password-input" required>
        </div>
        <button class="btn primary" type="submit" style="width:100%" data-testid="login-submit">Log in</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
