{% extends "base.html" %}
{% block body %}
<div class="auth">
  <div class="card">
    <div class="cb">
      <a class="brand" href="/"><span class="glyph">▚</span>pingward</a>
      <h1>Create the first admin</h1>
      {% if let Some(error) = error %}<p class="flash err" data-testid="setup-error">{{ error }}</p>{% endif %}
      <form method="post" action="/setup">
        <input type="hidden" name="_csrf" value="{{ csrf }}">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" data-testid="username-input" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" data-testid="password-input" required>
        </div>
        <button class="btn primary block" type="submit" data-testid="setup-submit">Create admin</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
