{% extends "base.html" %}
{% block body %}
{% let base %}{% if admin %}/admin{% endif %}{% endlet %}
<h1>New channel</h1>
{% if let Some(error) = error %}<p class="flash err">{{ error }}</p>{% endif %}
<div class="card">
  <div class="cb">
    <form method="post" action="{{ base }}/projects/{{ project_id }}/channels">
      <input type="hidden" name="_csrf" value="{{ csrf }}">
      <div class="field">
        <label for="name">Name</label>
        <input id="name" name="name" required>
      </div>
      <div class="field">
        <label for="kind">Kind</label>
        <select name="kind" id="kind">
          <option value="webhook">webhook</option>
          <option value="slack">slack</option>
          <option value="telegram">telegram</option>
          <option value="ntfy">ntfy</option>
          <option value="pushover">pushover</option>
          {% if smtp_available %}<option value="email">email</option>{% endif %}
        </select>
      </div>

      <div class="cfg" data-kind="webhook">
        <div class="field">
          <label for="webhook_url">Webhook URL</label>
          <input id="webhook_url" name="webhook_url">
        </div>
      </div>
      <div class="cfg" data-kind="slack">
        <div class="field">
          <label for="slack_url">Slack incoming webhook URL</label>
          <input id="slack_url" name="slack_url" class="mono" placeholder="https://hooks.slack.com/services/...">
          <div class="help">Paste the incoming webhook URL generated by your Slack app.</div>
        </div>
      </div>
      <div class="cfg" data-kind="telegram">
        <div class="field">
          <label for="telegram_token">Bot token</label>
          <input id="telegram_token" name="telegram_token">
        </div>
        <div class="field">
          <label for="telegram_chat_id">Chat id</label>
          <input id="telegram_chat_id" name="telegram_chat_id">
        </div>
      </div>
      <div class="cfg" data-kind="ntfy">
        <div class="field">
          <label for="ntfy_base_url">Server base URL</label>
          <input id="ntfy_base_url" name="ntfy_base_url" placeholder="https://ntfy.sh">
        </div>
        <div class="field">
          <label for="ntfy_topic">Topic</label>
          <input id="ntfy_topic" name="ntfy_topic">
        </div>
        <div class="field">
          <label for="ntfy_token">Token (optional)</label>
          <input id="ntfy_token" name="ntfy_token">
        </div>
      </div>
      <div class="cfg" data-kind="pushover">
        <div class="field">
          <label for="pushover_token">Application token</label>
          <input id="pushover_token" name="pushover_token">
        </div>
        <div class="field">
          <label for="pushover_user">User/group key</label>
          <input id="pushover_user" name="pushover_user">
        </div>
      </div>
      {% if smtp_available %}
      <div class="cfg" data-kind="email">
        <div class="field">
          <label for="email_to">Recipient email</label>
          <input id="email_to" name="email_to" type="email">
        </div>
      </div>
      {% endif %}

      <div class="btnrow">
        <button class="btn primary" type="submit">Create channel</button>
      </div>
    </form>
  </div>
</div>
<script>
  (function () {
    var sel = document.getElementById('kind');
    function sync() {
      var k = sel.value;
      document.querySelectorAll('.cfg').forEach(function (d) {
        d.style.display = d.getAttribute('data-kind') === k ? '' : 'none';
      });
    }
    sel.addEventListener('change', sync);
    sync();
  })();
</script>
{% endblock %}
