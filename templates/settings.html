{% extends "base.html" %}
{% block body %}
<div class="phead"><div><h1>Settings</h1></div></div>

<div class="card">
  <div class="cb">
    <form method="post" action="/settings">
      <input type="hidden" name="_csrf" value="{{ csrf }}">
      <div class="two">
        <div class="field">
          <label for="scan_interval">Global scan interval (seconds)</label>
          <input id="scan_interval" name="scan_interval" value="{{ scan_interval }}">
        </div>
        <div class="field">
          <label for="nag_interval">Global nag interval (seconds)</label>
          <input id="nag_interval" name="nag_interval" value="{{ nag_interval }}">
          <div class="help">Leave blank to turn off nagging.</div>
        </div>
      </div>
      <div class="two">
        <div class="field">
          <label for="pings_retention_days">Pings retention (days)</label>
          <input id="pings_retention_days" name="pings_retention_days" value="{{ pings_retention_days }}">
          <div class="help">Leave blank to keep forever.</div>
        </div>
        <div class="field">
          <label for="notifications_retention_days">Notifications retention (days)</label>
          <input id="notifications_retention_days" name="notifications_retention_days" value="{{ notifications_retention_days }}">
          <div class="help">Leave blank to keep forever.</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn primary" type="submit">Save changes</button>
      </div>
    </form>
  </div>
</div>

<p style="margin-top:16px"><a class="btn" href="/users">Manage users</a></p>
{% endblock %}
