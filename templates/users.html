{% extends "base.html" %}
{% block body %}
<div class="phead"><div><h1>Users</h1></div></div>

<div class="card">
  <div class="cb" style="padding-top:6px">
    <table>
      <thead><tr><th>Username</th><th>Admin</th><th></th></tr></thead>
      <tbody>
        {% for u in users %}
        <tr data-testid="user-row-{{ u.username }}">
          <td>{{ u.username }}</td>
          <td>{% if u.is_admin %}<span class="pill ok" data-testid="user-role">admin</span>{% else %}<span class="pill start" data-testid="user-role">member</span>{% endif %}{% if u.disabled %} <span class="pill fail" data-testid="user-disabled">disabled</span>{% endif %}</td>
          <td>
            <form class="inline" method="post" action="/users/{{ u.id }}/password">
              <input type="hidden" name="_csrf" value="{{ csrf }}">
              <input type="password" name="password" placeholder="new password" data-testid="user-reset-input" required>
              <button class="btn" type="submit" data-testid="user-reset-submit">reset</button>
            </form>
            <form class="inline" method="post" action="/users/{{ u.id }}/admin">
              <input type="hidden" name="_csrf" value="{{ csrf }}">
              <button class="btn" type="submit" data-testid="user-toggle-admin">{% if u.is_admin %}revoke admin{% else %}make admin{% endif %}</button>
            </form>
            <form class="inline" method="post" action="/users/{{ u.id }}/disabled">
              <input type="hidden" name="_csrf" value="{{ csrf }}">
              <button class="btn" type="submit" data-testid="user-toggle-disabled">{% if u.disabled %}enable{% else %}disable{% endif %}</button>
            </form>
            <form class="inline" method="post" action="/users/{{ u.id }}/delete"><input type="hidden" name="_csrf" value="{{ csrf }}"><button class="btn danger" type="submit" data-testid="user-delete">delete</button></form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

<div class="card" style="margin-bottom:0">
  <div class="ch"><h2>Add user</h2></div>
  <div class="cb">
    {% if let Some(error) = error %}<p class="flash err">{{ error }}</p>{% endif %}
    <form method="post" action="/users">
      <input type="hidden" name="_csrf" value="{{ csrf }}">
      <div class="two">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" data-testid="user-username-input" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" data-testid="user-password-input" required>
        </div>
      </div>
      <label class="chk">
        <input type="checkbox" name="is_admin" value="1" data-testid="user-admin-checkbox">
        <span class="nm">Admin</span>
      </label>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn primary" type="submit" data-testid="user-submit">Create user</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
