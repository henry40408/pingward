{% extends "base.html" %}
{% block body %}
<div class="phead"><div><h1>Users</h1></div></div>

<div class="card">
  <div class="cb" style="padding-top:6px">
    <table>
      <thead><tr><th>Username</th><th>Admin</th><th></th></tr></thead>
      <tbody>
        {% for u in users %}
        <tr>
          <td>{{ u.username }}</td>
          <td>{% if u.is_admin %}<span class="pill ok">admin</span>{% else %}<span class="pill start">member</span>{% endif %}</td>
          <td>
            <form class="inline" method="post" action="/users/{{ u.id }}/password">
              <input type="password" name="password" placeholder="new password" required>
              <button class="btn" type="submit">reset</button>
            </form>
            <form class="inline" method="post" action="/users/{{ u.id }}/delete"><button class="btn danger" type="submit">delete</button></form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

<div class="card" style="margin-bottom:0">
  <div class="ch"><h2>Add user</h2></div>
  <div class="cb">
    {% if let Some(error) = error %}<p class="flash err">{{ error }}</p>{% endif %}
    <form method="post" action="/users">
      <div class="two">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required>
        </div>
      </div>
      <label class="chk">
        <input type="checkbox" name="is_admin" value="1">
        <span class="nm">Admin</span>
      </label>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn primary" type="submit">Create user</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
