<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>pingward</title>
  <link rel="stylesheet" href="/assets/app.css">
  <script>
    (function(){try{var t=localStorage.getItem('pw-theme')||(matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
  </script>
</head>
<body>
  {% if show_nav %}
  <header class="bar"><div class="inner">
    <a class="brand" href="/"><span class="glyph">▚</span>pingward</a>
    <nav class="links"><a href="/">Dashboard</a>{% if is_admin %}<a href="/settings" data-testid="nav-settings">Settings</a><a href="/admin" data-testid="nav-admin">Admin</a>{% endif %}</nav>
    <div class="right">
      <button class="iconbtn" id="pw-theme-toggle" title="Toggle theme" aria-label="Toggle theme">◐</button>
      <form class="inline" method="post" action="/logout"><input type="hidden" name="_csrf" value="{{ csrf }}"><button class="ghost" type="submit" data-testid="logout-button">Log out</button></form>
    </div>
  </div></header>
  {% endif %}
  <main class="wrap">{% block body %}{% endblock %}</main>
  <script>
    (function(){var b=document.getElementById('pw-theme-toggle');if(!b)return;b.addEventListener('click',function(){var r=document.documentElement,n=r.getAttribute('data-theme')==='dark'?'light':'dark';r.setAttribute('data-theme',n);try{localStorage.setItem('pw-theme',n);}catch(e){}});})();
    // Render absolute timestamps (any `.localtime[data-ts]`) in the viewer's
    // local time zone, falling back to the server-rendered UTC text when JS is
    // off. Shared across every page so any template can opt in with the span.
    document.querySelectorAll('.localtime[data-ts]').forEach(function(el){
      var d = new Date(el.getAttribute('data-ts'));
      if (!isNaN(d.getTime())) {
        el.textContent = d.toLocaleString(undefined, { hour12: false });
        el.title = el.getAttribute('data-ts');
      }
    });
  </script>
</body>
</html>
