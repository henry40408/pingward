<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>pingward</title>
  <link rel="stylesheet" href="/assets/app.css?v={{ crate::assets::css_version() }}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v={{ crate::assets::icon_version() }}">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v={{ crate::assets::icon_version() }}">
  <script>
    // Resolve the applied theme before first paint (avoids a flash). The stored
    // preference is 'light' | 'dark' | 'system'; anything else (incl. unset)
    // means follow the OS. 'system' is re-resolved live by the listener below.
    (function(){try{var p=localStorage.getItem('pw-theme');var eff=(p==='light'||p==='dark')?p:(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',eff);}catch(e){}})();
  </script>
</head>
<body>
  {% if show_nav %}
  <header class="bar"><div class="inner">
    <a class="brand" href="/"><span class="glyph">▚</span>pingward</a>
    <nav class="links"><a href="/">Dashboard</a><a href="/account" data-testid="nav-account">Account</a>{% if is_admin %}<a href="/admin" data-testid="nav-admin">Admin</a>{% endif %}</nav>
    <div class="right">
      <button class="iconbtn" id="pw-theme-toggle" title="Toggle theme" aria-label="Toggle theme">◐</button>
      <form class="inline" method="post" action="/logout"><input type="hidden" name="_csrf" value="{{ csrf }}"><button class="ghost" type="submit" data-testid="logout-button">Log out</button></form>
    </div>
  </div></header>
  {% endif %}
  <main class="wrap">{% block body %}{% endblock %}</main>
  <script>
    (function(){
      var b=document.getElementById('pw-theme-toggle');if(!b)return;
      var mq=matchMedia('(prefers-color-scheme: dark)');
      var order=['light','dark','system'];
      // Stored preference, normalized: unset/unknown -> 'system' (follow OS).
      function pref(){var p=null;try{p=localStorage.getItem('pw-theme');}catch(e){}return (p==='light'||p==='dark'||p==='system')?p:'system';}
      // Apply preference p: resolve to an effective light/dark for data-theme,
      // and reflect the current preference in the button glyph + labels.
      function apply(p){
        var eff=(p==='light'||p==='dark')?p:(mq.matches?'dark':'light');
        document.documentElement.setAttribute('data-theme',eff);
        b.textContent=(p==='light'?'☀':p==='dark'?'☾':'◐');
        b.setAttribute('title','Theme: '+p+' (click to change)');
        b.setAttribute('aria-label','Theme: '+p+' (click to change)');
        b.setAttribute('data-theme-pref',p);
      }
      apply(pref());
      b.addEventListener('click',function(){
        var next=order[(order.indexOf(pref())+1)%order.length];
        try{localStorage.setItem('pw-theme',next);}catch(e){}
        apply(next);
      });
      // In 'system' mode, follow live OS colour-scheme changes.
      mq.addEventListener('change',function(){if(pref()==='system')apply('system');});
    })();
    // Render absolute timestamps (any `.localtime[data-ts]`) in the viewer's
    // local time zone, falling back to the server-rendered UTC text when JS is
    // off. Shared across every page so any template can opt in with the span.
    document.querySelectorAll('.localtime[data-ts]').forEach(function(el){
      var d = new Date(el.getAttribute('data-ts'));
      if (!isNaN(d.getTime())) {
        el.textContent = d.toLocaleString(undefined, { hour12: false });
        el.title = el.getAttribute('data-ts');
      }
    });
  </script>
</body>
</html>
